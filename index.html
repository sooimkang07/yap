<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>yAp</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png">
  <meta name="theme-color" content="#f7f7fb">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="components/voice-visualizer/voice-visualizer.css">
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCREEN: SPLASH                                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-splash" class="screen active" data-screen="splash">
    <div class="splash-content">
      <img class="splash-logo" src="assets/yap-logo.png" alt="yAp">
      <div class="splash-tagline">Less typing. More yapping.</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCREEN: CONTACTS PERMISSION                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-contacts-permission" class="screen" data-screen="contacts-permission">
    <div class="perm-bg">
      <div class="top-bar top-bar--permission">
        <h1 class="top-bar__title">Chats</h1>
        <div class="top-bar__actions">
          <button class="icon-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.6"/>
              <path d="M13.5 13.5L17.5 17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="self-avatar self-avatar--static" id="permission-self-avatar"></div>
        </div>
      </div>
    </div>
    <div class="sheet" id="permission-sheet">
      <div class="sheet-handle"></div>
      <img class="perm-app-badge" src="assets/access-contacts.png" alt="" aria-hidden="true">
      <div class="perm-heading">"yAp" Would Like to<br>Access Your Contacts</div>
      <div class="perm-sub">yAp uses contacts to show a list of every person or business the app has access to.</div>
      <div class="perm-actions">
        <button class="perm-btn perm-btn--primary" id="btn-allow-contacts">Allow Full Access</button>
        <button class="perm-btn perm-btn--secondary" id="btn-select-contacts">Select Contacts</button>
        <button class="perm-btn perm-btn--deny" id="btn-deny-contacts">Don't Allow</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCREEN: CHATS LIST                              -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-chats" class="screen" data-screen="chats">
    <div class="top-bar">
      <h1 class="top-bar__title">Chats</h1>
      <div class="top-bar__actions">
        <button class="icon-btn" id="btn-search" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.6"/>
            <path d="M13.5 13.5L17.5 17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="self-avatar" id="self-avatar">S</div>
      </div>
    </div>
    <div class="chats-grid" id="chats-grid">
      <!-- populated by data.js + app.js -->
    </div>
    <div class="chats-empty-state" id="chats-empty-state">
      <button class="chats-empty-state__cta" id="btn-start-chat" aria-label="Start a yap">
        <span class="chats-empty-state__plus" aria-hidden="true"></span>
        <span class="chats-empty-state__label">Start a yap</span>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCREEN: CHAT (BESTIES)                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-chat" class="screen" data-screen="chat">

    <!-- Chat header -->
    <div class="chat-header">
      <button class="back-btn" id="btn-back" aria-label="Back">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none">
          <path d="M7.5 1.5L1.5 7.5L7.5 13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="chat-header__center">
        <div class="chat-member-pips" id="chat-member-pips"></div>
        <h2 class="chat-title" id="chat-title">besties 👋</h2>
      </div>
      <div class="chat-header__right">
        <button class="icon-btn icon-btn--header" id="btn-chat-more" aria-label="More options">
          <svg width="18" height="4" viewBox="0 0 18 4" fill="none">
            <circle cx="2" cy="2" r="2" fill="currentColor"/>
            <circle cx="9" cy="2" r="2" fill="currentColor"/>
            <circle cx="16" cy="2" r="2" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat body -->
    <div class="chat-body" id="chat-body">

      <!-- Empty state: floating member avatars -->
      <div class="chat-empty" id="chat-empty">
        <div class="floating-avatar floating-avatar--chloe" id="floating-chloe">
          <div class="floating-avatar__label">Chloe</div>
          <div class="floating-avatar__photo"></div>
        </div>
        <div class="floating-avatar floating-avatar--maria" id="floating-maria">
          <div class="floating-avatar__label">Maria</div>
          <div class="floating-avatar__photo"></div>
        </div>
      </div>

      <!-- Topic cards (Phase 3+) -->
      <div class="chat-topics" id="chat-topics"></div>

      <!-- Processing stub (Phase 1 only — replaced by analysis modal in Phase 3) -->
      <div class="chat-processing" id="chat-processing" style="display:none">
        <div class="processing-pill">
          <span class="processing-dot"></span>
          Analyzing your memo…
        </div>
      </div>

    </div>

    <!-- Footer: mic button -->
    <div class="chat-footer">
      <div class="chat-presence" id="chat-presence"></div>
      <button class="mic-btn" id="btn-mic" aria-label="Record voice memo">
        <img class="mic-btn__icon" src="assets/record-button.svg" alt="" aria-hidden="true">
      </button>
    </div>

    <!-- ─────────────────────────────────────────── -->
    <!-- RECORDING OVERLAY                           -->
    <!-- ─────────────────────────────────────────── -->
    <div class="recording-overlay" id="recording-overlay" aria-hidden="true">

      <!-- Dark blur backdrop -->
      <div class="recording-backdrop"></div>

      <!-- Floating sheet -->
      <div class="recording-sheet" id="recording-sheet">
        <div class="rec-row rec-row--top">
          <button class="rec-icon-btn" id="btn-rec-cancel" aria-label="Cancel">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1 1L10 10M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="rec-timer" id="rec-timer">0:00</div>
          <div class="rec-spacer"></div>
        </div>

        <div class="waveform-wrap">
          <div class="voice-visualizer-mount" id="voice-visualizer-root" aria-hidden="true"></div>
        </div>

        <div class="rec-live-transcript" id="rec-live-transcript">Listening…</div>

        <div class="rec-row rec-row--actions" id="rec-actions-recording">
          <button class="rec-action-btn rec-action-btn--exit" id="btn-rec-exit" aria-label="Exit recording">
            <img class="rec-action-btn__asset" src="assets/exit-button.png" alt="" aria-hidden="true">
          </button>
          <button class="stop-btn" id="btn-stop" aria-label="Stop recording">
            <div class="stop-icon"></div>
          </button>
        </div>

        <div class="rec-row rec-row--actions hidden" id="rec-actions-stopped">
          <button class="rec-action-btn rec-action-btn--discard" id="btn-discard" aria-label="Discard">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="rec-action-btn rec-action-btn--play" id="btn-play" aria-label="Play preview">
            <svg width="28" height="30" viewBox="0 0 28 30" fill="none">
              <path d="M5 3.5L23 15L5 26.5V3.5Z" fill="currentColor"/>
            </svg>
          </button>
          <button class="rec-action-btn rec-action-btn--send" id="btn-send" aria-label="Send memo">
            <img class="rec-action-btn__asset" src="assets/send-button.png" alt="" aria-hidden="true">
          </button>
        </div>

        <div class="rec-row rec-row--actions hidden" id="rec-actions-sending">
          <div class="sending-indicator">
            <span class="sending-dot"></span>
            <span class="sending-dot"></span>
            <span class="sending-dot"></span>
          </div>
        </div>

      </div>
    </div>
    <!-- /recording-overlay -->

    <!-- ─────────────────────────────────────────── -->
    <!-- ANALYSIS OVERLAY                            -->
    <!-- Reuses recording-overlay + recording-sheet  -->
    <!-- CSS classes — same visual, different content-->
    <!-- ─────────────────────────────────────────── -->
    <div class="recording-overlay" id="analysis-overlay" aria-hidden="true">

      <div class="recording-backdrop"></div>

      <div class="recording-sheet">
        <div class="recording-sheet__handle"></div>

        <!-- Header: cancel / ✦ Analyzing / spacer -->
        <div class="rec-row rec-row--top">
          <button class="rec-icon-btn" id="btn-analysis-cancel" aria-label="Cancel analysis">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1 1L10 10M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="analysis-heading">
            <img class="analysis-sparkle" src="assets/analyzing-icon.svg" alt="" aria-hidden="true">
            <span id="analysis-label">Analyzing</span>
          </div>
          <div class="rec-spacer"></div>
        </div>

        <!-- Segment bars appear here -->
        <div class="analysis-bars" id="analysis-bars"></div>

      </div>
    </div>
    <!-- /analysis-overlay -->

  </div>
  <!-- /screen-chat -->

</div>
<!-- /app -->

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/recording.js"></script>
<script src="js/pipeline.js"></script>
<script src="js/analysis.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>
<script type="module" src="components/voice-visualizer/mount.js"></script>
</body>
</html>
